name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            target: bun-linux-x64
            artifact: privateclaw-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: privateclaw-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: privateclaw-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Compile standalone binary
        run: bun build --compile --target=${{ matrix.target }} --outfile=${{ matrix.artifact }} ./dist/bin/privateclaw.js

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
