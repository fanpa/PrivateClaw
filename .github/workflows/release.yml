name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-bun:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: bun-linux-x64
            artifact: privateclaw-linux-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: privateclaw-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Compile standalone binary
        run: bun run scripts/build-binary.ts ${{ matrix.target }} ${{ matrix.artifact }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  build-sea:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Build SEA binary
        run: node scripts/build-sea.ts privateclaw-darwin-arm64

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: privateclaw-darwin-arm64
